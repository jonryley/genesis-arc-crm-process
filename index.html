<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Summit | Pipeline</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:white}
.header{padding:15px 30px;border-bottom:1px solid #222;display:flex;justify-content:space-between}
.logo{height:40px}
h1{color:#d4af37;margin:0}
.pipeline{display:flex;gap:15px;overflow-x:auto;padding:20px}
.stage{background:#111;border:1px solid #222;min-width:300px;border-radius:6px}
.stage-header{padding:10px;border-bottom:1px solid #222;color:#d4af37}
.stage-body{padding:10px}
.card{background:#1a1a1a;border:1px solid #333;padding:10px;margin-bottom:10px;border-radius:4px;cursor:pointer}
.card:hover{border-color:#d4af37}
.tag{background:#d4af37;color:#000;padding:2px 6px;border-radius:10px;font-size:11px;margin-left:5px}
.green{border-left:4px solid #2ecc71}
.amber{border-left:4px solid #f39c12}
.filters{padding:15px}
select{background:#111;color:white;border:1px solid #333;padding:6px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9)}
.modal-content{background:#111;margin:5% auto;padding:30px;width:90%;max-width:600px}
</style>
</head>

<body>

<div class="header">
<h1>Summit Pipeline</h1>
</div>

<div class="filters">
Sector:
<select id="sectorFilter">
<option>All</option>
<option>Rail</option>
<option>Energy</option>
</select>

Classification:
<select id="classificationFilter">
<option>All</option>
<option>Lite</option>
<option>Strategic</option>
<option>Complex</option>
<option>Transformational</option>
</select>
</div>

<div class="pipeline" id="pipeline"></div>

<div id="modal" class="modal">
<div class="modal-content">
<h2 id="title"></h2>
<p><b>Value:</b> <span id="value"></span></p>
<p><b>Close:</b> <span id="closeDate"></span></p>
<p><b>Status:</b> <span id="status"></span></p>
<p><b>Sector:</b> <span id="sector"></span></p>
<p><b>Classification:</b> <span id="classification"></span></p>
<p><b>Offer:</b> <span id="offer"></span></p>
<hr>
<p><b>Gate:</b> <span id="gate"></span></p>
<p><b>Handover:</b> <span id="handover"></span></p>
<p><b>Review:</b> <span id="review"></span></p>
<br>
<a id="stageLink" target="_blank">Stage</a><br>
<a id="gateLink" target="_blank">Gate</a>
</div>
</div>

<script>

const stages=[
{name:"Signal",status:"Signal",weight:.1},
{name:"Qualify",status:"Qualify",weight:.25},
{name:"Value",status:"Value",weight:.5},
{name:"Convert",status:"Convert",weight:.75},
{name:"Deliver",status:"Deliver",weight:1},
{name:"Amplify",status:"Amplify",weight:1}
];

const opportunities=[

["Signal","Metro Rail","Rail",350000,"Strategic","Consultancy","Pass","In Progress","On Track","30 Jun","amber"],
["Signal","Moores Energy","Energy",420000,"Strategic","Licence","Pass","In Progress","On Track","15 Jul","amber"],
["Signal","Northern Grid Energy","Energy",500000,"Strategic","Upgrade","Pass","In Progress","On Track","01 Aug","amber"],
["Signal","Crown Rail Systems","Rail",375000,"Strategic","Consultancy","Pass","In Progress","On Track","12 Aug","amber"],

["Qualify","Summit Rail Partners","Rail",850000,"Complex","Licence","Pass","In Progress","On Track","20 Jul","green"],
["Qualify","Beacon Energy Group","Energy",950000,"Complex","Upgrade","Pass","In Progress","On Track","10 Aug","amber"],
["Qualify","Apex Energy Services","Energy",1200000,"Complex","Consultancy","Pass","In Progress","Watch","25 Aug","green"],
["Qualify","Platform Rail Alliance","Rail",1050000,"Complex","Licence","Pass","In Progress","On Track","05 Sep","amber"],

["Value","Pioneer Rail","Rail",1500000,"Complex","Consultancy","Pass","In Progress","On Track","15 Sep","green"],
["Value","Dunstone Energy","Energy",1800000,"Transformational","Licence","Pass","In Progress","On Track","30 Sep","green"],
["Value","Harbour Rail","Rail",1300000,"Complex","Upgrade","Pass","In Progress","Watch","10 Oct","amber"],

["Convert","Westline Rail","Rail",900000,"Complex","Consultancy","Pass","In Progress","On Track","31 Jul","amber"],
["Convert","Orion Energy","Energy",1100000,"Complex","Licence","Pass","In Progress","On Track","15 Aug","green"],
["Convert","MetroLink Rail","Rail",850000,"Complex","Upgrade","Pass","In Progress","Watch","01 Sep","amber"],

["Deliver","Keystone Rail","Rail",2000000,"Transformational","Licence","Pass","In Progress","On Track","30 Sep","green"],
["Deliver","Atlas Energy","Energy",1700000,"Transformational","Consultancy","Pass","In Progress","On Track","10 Oct","green"],
["Deliver","Sovereign Energy","Energy",2500000,"Transformational","Upgrade","Pass","In Progress","On Track","30 Oct","green"],
["Deliver","Northstar Rail","Rail",2200000,"Transformational","Licence","Pass","In Progress","On Track","05 Nov","green"],

["Amplify","Vanguard Rail","Rail",3000000,"Transformational","Licence","Pass","Complete","On Track","31 Dec","green"],
["Amplify","Titan Energy","Energy",4000000,"Transformational","Licence","Pass","Complete","On Track","31 Dec","green"],
["Amplify","National Rail Growth","Rail",3500000,"Transformational","Upgrade","Pass","Complete","On Track","31 Dec","green"],

["Qualify","Lumen Energy Lite","Energy",50000,"Lite","Pilot","Pass","Not Started","On Track","18 Oct","green"],
["Qualify","Bridgeway Rail Lite","Rail",50000,"Lite","Pilot","Pass","Not Started","On Track","22 Oct","green"],
["Convert","Moores Energy Lite","Energy",50000,"Lite","Pilot","Pass","In Progress","On Track","31 Oct","green"],
["Convert","Metro Rail Lite","Rail",50000,"Lite","Pilot","Pass","In Progress","On Track","05 Nov","green"],
["Deliver","Peak Energy Lite","Energy",50000,"Lite","Pilot","Pass","Not Started","On Track","12 Nov","green"],
["Deliver","Signal Rail Lite","Rail",50000,"Lite","Pilot","Pass","Not Started","On Track","15 Nov","green"]

];

function money(v){
return v>=1000000?"£"+(v/1000000).toFixed(1)+"M":"£"+v.toLocaleString();
}

function render(){

pipeline.innerHTML="";

stages.forEach(stage=>{

let col=document.createElement("div");
col.className="stage";
col.dataset.stage=stage.name;

col.innerHTML=`<div class="stage-header">${stage.name}</div><div class="stage-body"></div>`;
let body=col.querySelector(".stage-body");

opportunities.filter(o=>o[0]===stage.name).forEach(o=>{

let card=document.createElement("div");
card.className="card "+o[10];

card.dataset.sector=o[2];
card.dataset.classification=o[4];

card.innerHTML=`
<div class="card-title">${o[1]} <span class="tag">(${o[5]})</span></div>
<div>${money(o[3])}</div>
<div>${o[9]}</div>
<div>${o[2]} | ${o[4]}</div>
`;

card.onclick=()=>openModal(o,stage);

body.appendChild(card);
});

pipeline.appendChild(col);

});

}

function openModal(o,stage){
modal.style.display="block";
title.innerText=o[1];
value.innerText=money(o[3]);
closeDate.innerText=o[9];
status.innerText=stage.name;
sector.innerText=o[2];
classification.innerText=o[4];
offer.innerText=o[5];
gate.innerText=o[6];
handover.innerText=o[7];
review.innerText=o[8];
}

function applyFilters(){

let sector=sectorFilter.value;
let cls=classificationFilter.value;

document.querySelectorAll(".stage").forEach(stage=>{

if(cls==="Lite"){
stage.style.display=["Qualify","Convert","Deliver"].includes(stage.dataset.stage)?"block":"none";
}else{
stage.style.display="block";
}

});

document.querySelectorAll(".card").forEach(card=>{

let show=(sector==="All"||card.dataset.sector===sector)&&(cls==="All"||card.dataset.classification===cls);

card.style.display=show?"block":"none";

});

pipeline.style.justifyContent="flex-start"; // LEFT aligned always

}

sectorFilter.onchange=applyFilters;
classificationFilter.onchange=applyFilters;

render();

</script>

</body>
</html>
