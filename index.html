<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Summit | Pipeline</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial,sans-serif;background:#0b0b0b;color:white}
.header{padding:15px 30px;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:15px}
.logo{height:40px}
.header h1{color:#d4af37;margin:0;font-size:20px}
.metrics{display:flex;gap:20px;flex-wrap:wrap}
.metric{color:#d4af37;font-size:14px}
.container{padding:20px}
.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.filter-group{display:flex;flex-direction:column;gap:6px}
.filter-group label{font-size:12px;color:#aaa}
.filter-group select{
background:#111;color:#fff;border:1px solid #333;
padding:8px 10px;border-radius:4px
}
.pipeline{
display:flex;
gap:15px;
overflow-x:auto;
align-items:flex-start;
padding-bottom:10px
}
.stage{
background:#111;
border:1px solid #222;
min-width:310px;
display:flex;
flex-direction:column;
border-radius:6px
}
.stage.drag-over{
border-color:#d4af37;
box-shadow:0 0 0 1px #d4af37 inset
}
.stage-header{
padding:12px;
border-bottom:1px solid #222;
background:#0f0f0f
}
.stage-title{
font-weight:bold;
color:#d4af37
}
.stage-value{
font-size:12px;
color:#888;
margin-top:4px
}
.stage-body{
padding:10px;
min-height:360px
}
.card{
background:#1a1a1a;
border:1px solid #333;
padding:12px;
margin-bottom:10px;
cursor:grab;
border-radius:4px
}
.card:hover{
border-color:#d4af37;
transform:translateY(-2px)
}
.card.dragging{opacity:.55}
.card.hidden{display:none}
.card-title{font-weight:bold;margin-bottom:6px}
.card-value,.card-date,.card-status,.card-meta{
font-size:12px
}
.card-value{color:#aaa}
.card-date{color:#888}
.card-status{color:#d4af37;margin-top:4px}
.card-meta{color:#999;margin-top:6px;line-height:1.5}
.green{border-left:4px solid #2ecc71}
.amber{border-left:4px solid #f39c12}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
z-index:1000
}

.modal-content{
background:#111;
margin:5% auto;
padding:30px;
width:90%;
max-width:680px;
border:1px solid #333;
border-radius:6px
}

.close{
float:right;
font-size:18px;
cursor:pointer;
color:#d4af37
}

a{color:#d4af37}
</style>
</head>

<body>

<div class="header">
<div class="header-left">
<img src="images/JR%20LOGO%20white.png" class="logo">
<div>
<h1>Summit Pipeline</h1>
<div style="color:#888;font-size:13px;">
Gated Business Lifecycle
</div>
</div>
</div>

<div class="metrics">
<div class="metric" id="totalPipeline">Total Pipeline: £0</div>
<div class="metric" id="weightedPipeline">Weighted Pipeline: £0</div>
</div>
</div>

<div class="container">

<div class="filters">

<div class="filter-group">
<label>Sector</label>
<select id="sectorFilter">
<option value="All">All</option>
<option value="Rail">Rail</option>
<option value="Energy">Energy</option>
</select>
</div>

<div class="filter-group">
<label>Classification</label>
<select id="classificationFilter">
<option value="All">All</option>
<option>Lite</option>
<option>Standard</option>
<option>Strategic</option>
<option>Complex</option>
<option>Transformational</option>
</select>
</div>

</div>

<div class="pipeline" id="pipeline"></div>
</div>

<div id="modal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeModal()">X</span>

<h2 id="title"></h2>

<p><strong>Value:</strong> <span id="value"></span></p>
<p><strong>Close:</strong> <span id="closeDate"></span></p>
<p><strong>Status:</strong> <span id="status"></span></p>
<p><strong>Sector:</strong> <span id="sector"></span></p>
<p><strong>Classification:</strong> <span id="classification"></span></p>

<hr style="border:0;border-top:1px solid #333;margin:20px 0;">

<p><strong>Gate Readiness:</strong> <span id="gateReadiness"></span></p>
<p><strong>Handover:</strong> <span id="handover"></span></p>
<p><strong>Review Status:</strong> <span id="reviewStatus"></span></p>
<p><strong>Next Step:</strong> <span id="next"></span></p>

<br>

<a id="stageLink" target="_blank">View Stage Definition</a>
<br><br>
<a id="gateLink" target="_blank">View Gate</a>

</div>
</div>

<script>

let draggedCard=null;

const stages=[

{
name:"Signal",
weight:.10,
status:"Opportunity identified",
stageUrl:"https://github.com/jonryley/summit-growth-engine/blob/main/stages/stage-0-signal.md",
gateUrl:"https://github.com/jonryley/summit-growth-engine/blob/main/gates/gate-0-signal-check.md"
},

{
name:"Qualify",
weight:.25,
status:"In qualification",
stageUrl:"https://github.com/jonryley/summit-growth-engine/blob/main/stages/stage-1-qualify.md",
gateUrl:"https://github.com/jonryley/summit-growth-engine/blob/main/gates/gate-1-qualification-gate.md"
},

{
name:"Value",
weight:.50,
status:"Value defined",
stageUrl:"https://github.com/jonryley/summit-growth-engine/blob/main/stages/stage-2-value.md",
gateUrl:"https://github.com/jonryley/summit-growth-engine/blob/main/gates/gate-2-value-gate.md"
},

{
name:"Convert",
weight:.75,
status:"Proposal and close",
stageUrl:"https://github.com/jonryley/summit-growth-engine/blob/main/stages/stage-3-convert.md",
gateUrl:"https://github.com/jonryley/summit-growth-engine/blob/main/gates/gate-3-conversion-gate.md"
},

{
name:"Deliver",
weight:1,
status:"In delivery",
stageUrl:"https://github.com/jonryley/summit-growth-engine/blob/main/stages/stage-4-deliver.md",
gateUrl:"https://github.com/jonryley/summit-growth-engine/blob/main/gates/gate-4-delivery-readiness-gate.md"
},

{
name:"Amplify",
weight:1,
status:"Scaling",
stageUrl:"https://github.com/jonryley/summit-growth-engine/blob/main/stages/stage-5-amplify.md",
gateUrl:"https://github.com/jonryley/summit-growth-engine/blob/main/gates/gate-5-growth-gate.md"
}

];

const opportunities=[

["Signal","Metro Rail","Rail",350000,"Strategic","Pass","In Progress","On Track","30 Jun 2026","amber"],
["Signal","Moores Energy","Energy",420000,"Strategic","Pass","In Progress","On Track","15 Jul 2026","amber"],

["Qualify","Summit Rail Partners","Rail",850000,"Complex","Pass","In Progress","On Track","20 Jul 2026","green"],
["Qualify","Beacon Energy Group","Energy",950000,"Complex","Pass","In Progress","On Track","10 Aug 2026","amber"],

["Value","Pioneer Rail","Rail",1500000,"Complex","Pass","In Progress","On Track","15 Sep 2026","green"],
["Value","Dunstone Energy","Energy",1800000,"Transformational","Pass","In Progress","On Track","30 Sep 2026","green"],
["Value","Lumen Energy Lite","Energy",50000,"Lite","Pass","Not Started","On Track","18 Oct 2026","green"],
["Value","Bridgeway Rail Lite","Rail",50000,"Lite","Pass","Not Started","On Track","22 Oct 2026","green"],

["Deliver","Keystone Rail","Rail",2000000,"Transformational","Pass","In Progress","On Track","30 Sep 2026","green"],
["Deliver","Atlas Energy","Energy",1700000,"Transformational","Pass","In Progress","On Track","10 Oct 2026","green"],
["Deliver","Peak Energy Lite","Energy",50000,"Lite","Pass","Not Started","On Track","12 Nov 2026","green"],

["Amplify","Titan Energy","Energy",4000000,"Transformational","Pass","Complete","On Track","31 Dec 2026","green"],
["Amplify","National Rail Growth","Rail",3500000,"Transformational","Pass","Complete","On Track","31 Dec 2026","green"]

];

function money(v){
if(v>=1000000) return "£"+(v/1000000).toFixed(1)+"M";
return "£"+v.toLocaleString();
}

function nextStep(stage){
const m={
Signal:"Engage stakeholders",
Qualify:"Complete qualification gate",
Value:"Build value case",
Convert:"Close plan",
Deliver:"Expand account",
Amplify:"Scale growth"
};
return m[stage];
}

function render(){

const board=document.getElementById("pipeline");
board.innerHTML="";

stages.forEach(stage=>{

let wrap=document.createElement("div");
wrap.className="stage";
wrap.dataset.stage=stage.name;
wrap.dataset.weight=stage.weight;
wrap.dataset.status=stage.status;
wrap.dataset.stageurl=stage.stageUrl;
wrap.dataset.gateurl=stage.gateUrl;

wrap.innerHTML=`
<div class="stage-header">
<div class="stage-title">${stage.name}</div>
<div class="stage-value" id="${stage.name.toLowerCase()}Total"></div>
</div>
<div class="stage-body"></div>
`;

let body=wrap.querySelector(".stage-body");

opportunities
.filter(o=>o[0]===stage.name)
.forEach(o=>{

let card=document.createElement("div");

card.className=`card ${o[9]}`;
card.draggable=true;

card.dataset.sector=o[2];
card.dataset.value=o[3];
card.dataset.classification=o[4];
card.dataset.gatereadiness=o[5];
card.dataset.handover=o[6];
card.dataset.review=o[7];
card.dataset.close=o[8];

card.innerHTML=`
<div class="card-title">${o[1]}</div>
<div class="card-value">Value: ${money(o[3])}</div>
<div class="card-date">Close: ${o[8]}</div>
<div class="card-status">Status: ${stage.status}</div>
<div class="card-meta">
Sector: ${o[2]}<br>
Classification: ${o[4]}
</div>
`;

body.appendChild(card);

});

board.appendChild(wrap);

});

bindEvents();
calc();

}

function openModal(card){

let stage=card.closest(".stage");

document.getElementById("modal").style.display="block";

title.innerText=
card.querySelector(".card-title").innerText;

value.innerText=
card.dataset.value;

closeDate.innerText=
card.dataset.close;

status.innerText=
stage.dataset.status;

sector.innerText=
card.dataset.sector;

classification.innerText=
card.dataset.classification;

gateReadiness.innerText=
card.dataset.gatereadiness;

handover.innerText=
card.dataset.handover;

reviewStatus.innerText=
card.dataset.review;

next.innerText=
nextStep(stage.dataset.stage);

stageLink.href=
stage.dataset.stageurl;

gateLink.href=
stage.dataset.gateurl;

}

function closeModal(){
modal.style.display="none";
}

function bindEvents(){

document.querySelectorAll(".card").forEach(card=>{

card.onclick=()=>openModal(card);

card.addEventListener("dragstart",()=>{
draggedCard=card;
});

card.addEventListener("dragend",()=>{
draggedCard=null;
calc();
});

});

document.querySelectorAll(".stage-body").forEach(body=>{

body.addEventListener("dragover",e=>{
e.preventDefault();
});

body.addEventListener("drop",e=>{
e.preventDefault();
if(draggedCard){
body.appendChild(draggedCard);
calc();
}
});

});

}

function calc(){

let total=0;
let weighted=0;

document.querySelectorAll(".stage").forEach(stage=>{

let stotal=0;
let weight=parseFloat(stage.dataset.weight);

stage.querySelectorAll(".card:not(.hidden)").forEach(card=>{

let v=parseFloat(card.dataset.value);

total+=v;
stotal+=v;
weighted+=v*weight;

});

document.getElementById(
stage.dataset.stage.toLowerCase()+"Total"
).innerText="£"+stotal.toLocaleString();

});

totalPipeline.innerText=
"Total Pipeline: £"+total.toLocaleString();

weightedPipeline.innerText=
"Weighted Pipeline: £"+
Math.round(weighted).toLocaleString();

}

function applyFilters(){

let sector=sectorFilter.value;
let cls=classificationFilter.value;

document.querySelectorAll(".card").forEach(card=>{

let show=
(sector==="All"||card.dataset.sector===sector) &&
(cls==="All"||card.dataset.classification===cls);

card.classList.toggle("hidden",!show);

});

calc();

}

sectorFilter.addEventListener(
"change",
applyFilters
);

classificationFilter.addEventListener(
"change",
applyFilters
);

render();

</script>

</body>
</html>
